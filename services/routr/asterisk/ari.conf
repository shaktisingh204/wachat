; SabCall media tier — Asterisk REST Interface (ARI).
;
; This is the control plane the host-run `sabcall-engine` connects to. The
; engine's defaults (ASTERISK_ARI_USER / ASTERISK_ARI_PASS / ASTERISK_ARI_APP)
; are sabcall / sabcall / sabcall — the user below MUST match those.
;
; The engine:
;   1. opens the ARI event WebSocket subscribing to the Stasis app `sabcall`,
;   2. drives each call (answer/play/record/bridge/originate) via the ARI REST
;      API on http://localhost:8088/ari.
;
; Requires http.conf to have the built-in HTTP server enabled.

[general]
enabled = yes
; Pretty-print JSON responses — handy when poking ARI by hand with curl.
pretty = yes
; CORS: allow any origin so a browser-based debug tool / WebRTC client can hit
; ARI in local dev. TIGHTEN THIS in production to your known origins.
allowed_origins = *

; ── ARI user the sabcall-engine authenticates as ─────────────────────────────
; LOCAL DEV credentials. Change `password` (and the engine's ASTERISK_ARI_PASS)
; before exposing 8088 anywhere beyond localhost.
[sabcall]
type = user
read_only = no
password = sabcall
; password_format = plain is the default; left explicit for clarity.
password_format = plain
