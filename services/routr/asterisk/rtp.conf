; SabCall media tier — RTP port range.
;
; This MUST match the UDP range the compose file publishes for the asterisk
; service (10000-10100/udp). Inbound/outbound audio flows over these ports.
;
; A 100-port window comfortably covers many concurrent calls locally; widen it
; (and the compose `ports:` mapping) for higher concurrency. Keep both in sync.

[general]
rtpstart = 10000
rtpend = 10100

; ICE/STUN/TURN are off by default (local/LAN testing reaches RTP directly).
; If a softphone or carrier is behind NAT relative to this box, enable STUN and
; advertise the box's reachable address (see pjsip.conf transport external_*).
; icesupport = yes
; stunaddr = stun.l.google.com:19302
