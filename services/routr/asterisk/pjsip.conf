; SabCall media tier — PJSIP (SIP) config.
;
; ┌─ Topology ──────────────────────────────────────────────────────────────┐
; │  softphone / carrier ─▶ Routr edgeport (host :5060) ─▶ Asterisk (this box)│
; │                                                       └▶ Stasis(sabcall)  │
; │  Asterisk REGISTERs UP to Routr as peer `asterisk` so Routr knows where   │
; │  to send calls for AOR sip:sabcall@sip.local.                            │
; └──────────────────────────────────────────────────────────────────────────┘
;
; Inside the compose network the Routr SIP listener is reachable at
; `edgeport01:5060` (the service name from compose.yaml). The Peer/Credentials
; come from config/resources/{peers,credentials}.yaml:
;     username: asterisk   password: changeme   aor: sip:sabcall@sip.local
;
; NOTE ON ADDRESSING: `edgeport01` resolves on the Docker network. If you run
; Asterisk somewhere that can't resolve that name, replace `edgeport01` below
; with Routr's reachable host/IP. Likewise the `identify` match address must be
; Routr's source IP as Asterisk sees it — see the comment on [routr-identify].

; ╔══════════════════════════════════════════════════════════════════════════╗
; ║ Transport                                                                  ║
; ╚══════════════════════════════════════════════════════════════════════════╝
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
; If this box is NAT'd relative to Routr/carrier, advertise the reachable addr:
; external_media_address = <your-host-ip>
; external_signaling_address = <your-host-ip>
; local_net = 10.0.0.0/8
; local_net = 172.16.0.0/12
; local_net = 192.168.0.0/16

; ╔══════════════════════════════════════════════════════════════════════════╗
; ║ Registration UP to Routr — backs AOR sip:sabcall@sip.local                ║
; ╚══════════════════════════════════════════════════════════════════════════╝
; Asterisk REGISTERs to Routr's edgeport as `asterisk` so Routr's registry binds
; the AOR to this media server. registerInterval in Routr's registry.yaml is 20s.
[routr-reg]
type = registration
transport = transport-udp
; Where to register (Routr edgeport) and as whom (the AOR user).
server_uri = sip:edgeport01:5060
client_uri = sip:sabcall@sip.local
outbound_auth = routr-auth
retry_interval = 20
forbidden_retry_interval = 30
expiration = 120
; Routr's edgeport is the next hop for the REGISTER.
contact_user = asterisk
line = yes
endpoint = routr-endpoint

[routr-auth]
type = auth
auth_type = userpass
; Matches credentials-asterisk in config/resources/credentials.yaml.
username = asterisk
password = changeme

; ╔══════════════════════════════════════════════════════════════════════════╗
; ║ AOR + Endpoint for the Routr peer link                                     ║
; ╚══════════════════════════════════════════════════════════════════════════╝
; This AOR/endpoint pair represents the Asterisk side of the Routr peer. It also
; defines how calls Routr sends here are handled: answer → Stasis(sabcall).
[routr-aor]
type = aor
; Static contact to Routr's edgeport so Asterisk can route back toward Routr.
contact = sip:edgeport01:5060
qualify_frequency = 30

[routr-endpoint]
type = endpoint
transport = transport-udp
context = sabcall-inbound
; Codecs offered toward Routr / the far end.
disallow = all
allow = ulaw
allow = alaw
allow = opus
aors = routr-aor
outbound_auth = routr-auth
; Authenticate inbound requests from Routr against the same creds.
auth = routr-auth
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
dtmf_mode = rfc4733

; ╔══════════════════════════════════════════════════════════════════════════╗
; ║ Identify — match calls coming FROM Routr to the endpoint above             ║
; ╚══════════════════════════════════════════════════════════════════════════╝
; Routr sends the routed INVITE from the edgeport container. PJSIP must map that
; source to `routr-endpoint` so the call lands in context `sabcall-inbound`.
;
; `match` accepts a hostname (resolved at load) or CIDR. `edgeport01` works on
; the compose network; if Routr's INVITEs arrive from a different/translated IP
; (NAT, host networking, a LAN/public deployment), add that IP/CIDR here. You
; can confirm the real source with: `pjsip set logger on` then watch the INVITE.
[routr-identify]
type = identify
endpoint = routr-endpoint
match = edgeport01
; match = 172.16.0.0/12        ; Docker bridge range — uncomment/adjust if needed
; match = <routr-host-ip>      ; for LAN/public Routr
