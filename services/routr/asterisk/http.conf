; SabCall media tier — built-in HTTP server.
;
; ARI rides on Asterisk's built-in HTTP server, so this MUST be enabled for the
; sabcall-engine to connect. We bind 0.0.0.0:8088 inside the container; the
; compose file publishes it to the host as :8088, which is where the engine's
; ASTERISK_ARI_URL (http://localhost:8088) points.
;
; The WebSocket upgrade on this same port carries the ARI event stream
; (ASTERISK_ARI_WS_URL=ws://localhost:8088); res_http_websocket handles it.

[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088
; URI prefix Asterisk serves under. ARI lives at /ari, so the engine talks to
; http://localhost:8088/ari. Leave empty unless you front this with a proxy.
prefix =
; Allow the WebSocket upgrade used by ARI's event stream.
enablestatic = no
sessionlimit = 100
session_inactivity = 30000
session_keep_alive = 15000

; ── TLS (optional) ────────────────────────────────────────────────────────────
; For production you'd terminate TLS here or in front of Asterisk and point the
; engine at https/wss. Local dev uses plain http/ws.
; tlsenable = yes
; tlsbindaddr = 0.0.0.0:8089
; tlscertfile = /etc/asterisk/keys/asterisk.pem
; tlsprivatekey = /etc/asterisk/keys/asterisk.key
