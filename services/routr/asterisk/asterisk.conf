; SabCall media tier — Asterisk core config.
;
; This Asterisk runs in Docker (andrius/asterisk:18-current) BEHIND Routr (the
; SIP proxy). Routr routes inbound calls for AOR sip:sabcall@sip.local to this
; box; Asterisk answers them into Stasis(sabcall), where the host-run
; `sabcall-engine` drives the call over ARI (http://localhost:8088).
;
; Minimal core config. The image already ships the standard /var/lib paths; we
; only pin the directories + a few options so the container behaves predictably.

[directories](!)
astetcdir => /etc/asterisk
astmoddir => /usr/lib/asterisk/modules
astvarlibdir => /var/lib/asterisk
astdbdir => /var/lib/asterisk
astkeydir => /var/lib/asterisk
astdatadir => /var/lib/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk
astsbindir => /usr/sbin

[options]
; Derive the system name from the hostname so multiple stacks don't collide.
autosystemname = yes
; Don't fork — let Docker own the process lifecycle (PID 1).
nofork = yes
; Keep the verbose/debug levels sane for a container; raise for troubleshooting.
verbose = 3
debug = 0
; A real-world media server; bump these if you run many concurrent calls.
maxcalls = 1000
maxload = 0.9
; Hang up calls if the system runs low on memory rather than thrashing.
minmemfree = 32
; Colorized console is noise in container logs.
documentation_language = en_US
