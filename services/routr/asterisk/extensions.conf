; SabCall media tier — dialplan.
;
; The only job of this dialplan is to hand every call Routr routes here into
; Stasis(sabcall). From that point the host-run `sabcall-engine` owns the call
; over ARI and runs the app's verb flow (greeting / menu / record / bridge /
; autopilot, etc.). We deliberately keep zero call logic in the dialplan.

[general]
static = yes
writeprotect = no

[globals]

; ── Inbound from Routr ────────────────────────────────────────────────────────
; pjsip.conf's routr-endpoint sets context = sabcall-inbound. Calls Routr sends
; for AOR sip:sabcall@sip.local arrive here with the dialed number as the exten.
[sabcall-inbound]
; Catch ANY dialed pattern (DID, extension, the AOR user) and pass it to Stasis.
exten => _.,1,NoOp(SabCall inbound: ${EXTEN} from ${CALLERID(num)})
 same => n,Answer()
 same => n,Stasis(sabcall)
 same => n,Hangup()

; Explicit catch for calls addressed to the bare AOR user `sabcall`
; (e.g. sip:sabcall@sip.local) — same Stasis hand-off, in case `_.` doesn't
; match a non-numeric user on your Routr build.
exten => sabcall,1,NoOp(SabCall inbound (AOR user))
 same => n,Answer()
 same => n,Stasis(sabcall)
 same => n,Hangup()
