; SabCall media tier — module loader.
;
; Simplest correct setting: autoload everything the image ships. The bundled
; andrius/asterisk:18-current image has the modules we need; autoload pulls in
; res_pjsip (SIP), res_ari* + app_stasis (the ARI/Stasis control plane the
; sabcall-engine drives), res_rtp_asterisk (media), and chan_pjsip.
;
; If you prefer an explicit allowlist for a smaller surface, set
; `autoload=no` and uncomment the `load =>` lines below.

[modules]
autoload = yes

; Nothing here is required while autoload=yes, but a couple of modules are
; pure noise/risk on a headless media box — preload-deny them.
noload = chan_sip.so          ; deprecated SIP channel; we use chan_pjsip
noload = res_hep.so           ; HEP/Homer capture not used locally
noload = res_hep_pjsip.so
noload = res_hep_rtcp.so

; ── Explicit allowlist (only used if you flip autoload=no) ────────────────────
; load => res_pjsip.so
; load => res_pjsip_session.so
; load => chan_pjsip.so
; load => res_pjsip_authenticator_digest.so
; load => res_pjsip_endpoint_identifier_ip.so
; load => res_pjsip_endpoint_identifier_user.so
; load => res_pjsip_outbound_registration.so
; load => res_pjsip_outbound_authenticator_digest.so
; load => res_pjsip_registrar.so
; load => res_rtp_asterisk.so
; load => res_http_websocket.so
; load => res_ari.so
; load => res_ari_applications.so
; load => res_ari_channels.so
; load => res_ari_bridges.so
; load => res_ari_endpoints.so
; load => res_ari_playbacks.so
; load => res_ari_recordings.so
; load => res_ari_device_states.so
; load => res_ari_asterisk.so
; load => res_ari_events.so
; load => res_ari_sounds.so
; load => res_ari_model.so
; load => res_stasis.so
; load => app_stasis.so
; load => res_format_attr_opus.so
; load => codec_opus.so
