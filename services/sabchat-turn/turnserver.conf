# coturn configuration for SabChat voice/video + co-browse.
#
# This TURN/STUN relay is what makes WebRTC traverse NAT for 1:1 agent↔visitor
# calls + screen-share. For 1:1 sessions no SFU is required — media is peer-to-
# peer, relayed through TURN only when a direct path is blocked.
#
# Provision: see services/sabchat-turn/README.md. The `__SABCHAT_TURN_SECRET__`
# placeholder is replaced at deploy with the value of $SABCHAT_TURN_SECRET — the
# SAME secret the Next layer signs short-lived credentials with
# (src/app/actions/sabchat-voice.actions.ts → getIceServers).

# ── Ports ──────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349
# Relay port range — open these in the firewall / security group.
min-port=49152
max-port=65535

# ── Auth: REST API time-limited credentials (RFC 5766 / TURN REST API) ───────
# The web app hands each call a username `<expiry-unix>:sabchat` and a
# credential `base64(HMAC-SHA1(secret, username))`. coturn verifies it with the
# same shared secret — so no per-user accounts, and creds expire automatically.
use-auth-secret
static-auth-secret=__SABCHAT_TURN_SECRET__
realm=sabchat

# ── TLS (recommended in production; point at your certs) ─────────────────────
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# ── Hardening ────────────────────────────────────────────────────────────────
fingerprint
no-cli
no-multicast-peers
stale-nonce=600
# Block relaying to internal / link-local ranges (basic SSRF guard). Adjust if
# your visitors legitimately sit behind one of these from the relay's vantage.
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# ── Logging ──────────────────────────────────────────────────────────────────
log-file=stdout
simple-log
