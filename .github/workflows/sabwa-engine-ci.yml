name: sabwa-engine-ci

on:
  push:
    branches: [main]
    paths:
      - "services/sabwa-engine/**"
      - ".github/workflows/sabwa-engine-ci.yml"
  pull_request:
    paths:
      - "services/sabwa-engine/**"
      - ".github/workflows/sabwa-engine-ci.yml"

# Cancel superseded runs on the same branch / PR to save CI minutes.
concurrency:
  group: sabwa-engine-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sabwa-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/sabwa-engine

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: services/sabwa-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/sabwa-engine

      - name: cargo test
        run: cargo test --no-fail-fast

  build:
    name: cargo build --release
    runs-on: ubuntu-latest
    needs: [check, test]
    defaults:
      run:
        working-directory: services/sabwa-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/sabwa-engine

      - name: cargo build --release
        run: cargo build --release --bin sabwa-engine
