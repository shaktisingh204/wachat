name: rust-ci

on:
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

# Cancel superseded runs on the same branch / PR to save CI minutes.
concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: cargo fmt --check
        working-directory: rust
        run: cargo fmt --all --check

      - name: cargo clippy
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check
        working-directory: rust
        run: cargo check --workspace --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    needs: check
    env:
      # Skip Docker / testcontainers-backed tests in CI for now; they will be
      # re-enabled once a dedicated services job is added.
      SKIP_TESTCONTAINERS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: cargo test
        working-directory: rust
        run: cargo test --workspace --no-fail-fast

  build-image:
    name: docker build (no push)
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sabnode-api)
        uses: docker/build-push-action@v6
        with:
          context: rust
          file: rust/Dockerfile
          push: false
          tags: sabnode-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
