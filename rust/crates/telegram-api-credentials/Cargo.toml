[package]
name = "telegram-api-credentials"
version = "0.1.0"
edition = "2024"
description = "Telegram MTProto API credentials (api_id/api_hash) per project. Stores credentials, runs a soft verify, and exposes placeholder login-session endpoints that a future MTProto worker will fill in."
license = "UNLICENSED"
publish = false

[lib]
name = "telegram_api_credentials"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }
futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
anyhow = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "gzip"] }
regex = "1"
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
