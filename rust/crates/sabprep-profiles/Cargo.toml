[package]
name = "sabprep-profiles"
version = "0.1.0"
edition = "2024"
description = "SabPrep column profiles — null counts, distinct counts, min/max/mean, top values, suggested cleansing chips. Pure compute over Vec<Row> + persistence in `sabprep_profiles`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabprep_profiles"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3.2"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
axum = { version = "0.8", default-features = false, features = ["json", "http1", "query"] }
tracing = "0.1"
anyhow = "1.0"

crm-common = { path = "../crm-common" }
sabnode-auth = { path = "../auth" }
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
sabprep-steps = { path = "../sabprep-steps" }

[lints]
workspace = true
