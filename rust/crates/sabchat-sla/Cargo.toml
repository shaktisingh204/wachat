# Phase — axum router for the SabChat **SLA policies** HTTP surface.
#
# Owns tenant-scoped SLA policy CRUD plus the two derived endpoints:
#   * `POST /apply/{conversationId}`  — pick the most-specific active
#                                       policy and stamp the three
#                                       due-at timestamps onto the
#                                       conversation document.
#   * `POST /sweep`                    — walk every open conversation in
#                                       the tenant, refresh the cached
#                                       `breached` flag against `now`.
#                                       Cron-callable.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-sla"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabChat SLA policies HTTP surface (`/v1/sabchat/sla/*`). Owns CRUD over `sabchat_sla_policies`, plus the `apply` (most-specific match + due-at compute) and `sweep` (recompute `breached` across open conversations) endpoints."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_sla"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (policy / tenant ids on the wire are hex
# strings; parsed via `ObjectId::parse_str` and `oid_from_str`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` and due-at computation.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — domain DTOs, shared error envelope, JWT extractor,
# Mongo handle.
sabchat-types = { path = "../sabchat-types" }
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
