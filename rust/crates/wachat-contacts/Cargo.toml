# Phase — axum router for the wachat **contacts** HTTP surface.
#
# Mirrors the work done by `src/app/actions/contact.actions.ts`:
#   * Mongo reads  — paginated list with project + phoneNumberId + tags + search.
#   * Mongo writes — add / import (bulk upsert) / update details / update status
#                    / update tags / delete.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "wachat-contacts"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the wachat contacts HTTP surface (`/v1/contacts/*`). Owns add / list / import / update / delete endpoints; ports `src/app/actions/contact.actions.ts`."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_contacts"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (contact / project ids on the wire are hex
# strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
