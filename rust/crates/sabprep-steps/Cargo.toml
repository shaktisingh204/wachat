[package]
name = "sabprep-steps"
version = "0.1.0"
edition = "2024"
description = "SabPrep recipe step DTOs + the bounded in-memory execution engine. Implements the typed step ops (filter, rename, derive, split, replace, deduplicate, fillNulls, typeCast, join, union, aggregate, pivot, unpivot) applied to Vec<HashMap<String, Value>> rows."
license = "UNLICENSED"
publish = false

[lib]
name = "sabprep_steps"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

[lints]
workspace = true
