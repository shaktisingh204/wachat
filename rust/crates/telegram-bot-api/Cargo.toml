[package]
name = "telegram-bot-api"
version = "0.1.0"
edition = "2024"
description = "Telegram Bot API webhook receiver"
license = "UNLICENSED"
publish = false

[lib]
name = "telegram_bot_api"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros"] }
tokio = { version = "1", features = ["macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
anyhow = "1"
thiserror = "2"
sabnode-db = { path = "../db" }

[lints]
workspace = true
