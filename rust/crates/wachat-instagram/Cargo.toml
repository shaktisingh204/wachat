[package]
name = "wachat-instagram"
version = "0.1.0"
edition = "2024"
description = "Instagram Graph API surface for SabNode — ports `src/app/actions/instagram.actions.ts`. Mounts under `/v1/instagram` and proxies media browse, comments, stories, business-discovery, hashtag search, and image-post publishing through `wachat_meta_client::MetaClient`."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_instagram"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

tracing = "0.1"
anyhow = "1"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-meta-client = { path = "../wachat-meta-client" }

[lints]
workspace = true
