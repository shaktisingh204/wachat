# Phase 3 slice 6 — axum router for the wachat templates HTTP surface.
#
# This crate is the HTTP front door for everything the prior Phase 3 slices
# (1..5) implement. It owns no business logic — every handler delegates to
# one of the engine crates and renders the result through `ApiError`'s
# `IntoResponse` impl.
#
# Per the Phase 3 slice contract, this crate is a leaf: it does NOT modify
# the workspace `Cargo.toml`, has no `[workspace]` table, and does not
# touch other crates' source.
[package]
name = "wachat-templates-router"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the wachat templates HTTP surface (`/v1/wachat/templates/*`). Wires the read / mutate / sync / library / send engines from Phase 3 slices 1-5 behind a single `Router<S>` generic over the caller's app state."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_templates_router"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — `Router`, `State`, `Path`, `Query`, `Json` extractors.
# Same feature set as sibling routers (`wachat-webhook-config`) so the
# whole api crate compiles with a single resolved feature union.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (project ids, template ids on the wire are
# hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2.13", features = ["chrono-0_4"] }

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# Sibling crates — shared error envelope, JWT extractor, Mongo handle, and
# every engine the handlers delegate to.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-templates = { path = "../wachat-templates" }
wachat-templates-mutate = { path = "../wachat-templates-mutate" }
wachat-templates-sync = { path = "../wachat-templates-sync" }
wachat-templates-categories = { path = "../wachat-templates-categories" }
wachat-templates-send = { path = "../wachat-templates-send" }
wachat-templates-engine = { path = "../wachat-templates-engine" }

[dev-dependencies]
# Tokio macros for `#[tokio::test(...)]`.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
# Re-pulled so test fixtures can build a typed `Router<TestState>`.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }

[lints]
workspace = true
