# Phase — axum router for the SabChat **compliance** HTTP surface.
#
# Owns the GDPR / India DPDP / CCPA toolkit:
#   * Data subject requests (DSR) — export and delete flows.
#   * Retention rules CRUD + a sweep job that prunes aged rows.
#   * One-off PII redaction utility (regex masks for email / phone /
#     credit-card-like / SSN strings).
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-compliance"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat compliance HTTP surface (`/v1/sabchat/compliance/*`). Owns data-subject-request, retention-rule, and PII redaction endpoints for GDPR / India DPDP / CCPA flows."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_compliance"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId + Document construction (rule / request ids on the wire
# are hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / retention-cutoff math.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Regex engine used by the PII redactor.
regex = "1"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# and the SabChat domain DTOs (used for the redacted `ContentBlock`).
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
