# Phase — axum router for the SabChat **outbound webhooks** HTTP surface.
#
# Tenants register endpoints to receive SabChat events (e.g.
# `message.created`, `conversation.updated`). This crate owns the CRUD
# surface for those endpoints, the synthetic `test` send, the delivery
# log read API, the DLQ read API, and a public `enqueue(...)` helper
# that sibling crates call when they emit an event.
#
# Out of scope for this crate (intentional):
#   * Actual outbound HTTP firing — a separate worker pulls
#     `sabchat_webhook_deliveries` rows in `pending` status and POSTs
#     them, computing the `X-SabChat-Signature` header with
#     `hmac_sha256(secret, body)` on the way out.
#   * Retry scheduler / DLQ mover — same worker.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-webhooks"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat outbound-webhooks HTTP surface (`/v1/sabchat/webhooks/*`). Owns endpoint CRUD, synthetic test send, delivery log + DLQ read APIs, and a public `enqueue(...)` helper that records a delivery row per matching endpoint."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_webhooks"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId / DateTime construction.
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# HMAC signing — `X-SabChat-Signature` is `hex(hmac_sha256(secret, body))`.
# Documented here so the helper that computes signatures lives next to
# the storage of the `secret` it consumes; the actual outbound worker
# will reuse the same primitive.
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

# Endpoint URL validation on register / update.
url = "2"

# Sibling crates — shared error envelope, JWT extractor, Mongo handle.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
