# SabCRM — axum router for the **object metadata** HTTP surface.
#
# CRUD over the `sabcrm_objects` Mongo collection, merged on top of the
# six built-in standard objects from `sabcrm-core`. Tenancy is by
# `projectId` (a query/body string), not `userId`.
#
# Mirrors `src/lib/sabcrm/objects.server.ts`. Mounted under
# `/v1/sabcrm/objects` from the orchestrating `api` crate.
[package]
name = "sabcrm-objects"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabCRM object-metadata HTTP surface (`/v1/sabcrm/objects/*`). Merged standard + custom object metadata, scoped by `projectId`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcrm_objects"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"

anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabcrm-core = { path = "../sabcrm-core" }

[lints]
workspace = true
