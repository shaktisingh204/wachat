# Phase ŌĆö axum router for the SabChat **public-API** HTTP surface.
#
# Mirrors the read/write footprint of the sibling SabChat agent-side
# routers (`sabchat-contacts`, `sabchat-conversations`, `sabchat-messages`)
# but authenticates via API-key (`X-Api-Key` / `Authorization: Bearer ŌĆ”`)
# instead of the JWT used by the agent UI. Mounted at
# `/v1/sabchat/public/*` so the auth flavor is explicit at the URL level.
#
# The verifier itself lives in `wachat-public-api::ApiKeyVerifier` ŌĆö we
# reuse it verbatim (no duplicate `api_keys` collection lookup logic in
# this crate). Scope strings used by the SabChat surface are
# `sabchat:read` and `sabchat:write`; the wildcard `*` satisfies either
# (semantics inherited from [`ApiAuthContext::has_scope`]).
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-public-api"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabChat public-API HTTP surface (`/v1/sabchat/public/*`). API-key-authenticated read/write over `sabchat_contacts`, `sabchat_conversations`, `sabchat_messages`. Reuses `wachat_public_api::ApiKeyVerifier` for the `X-Api-Key` lookup pipeline; scope strings `sabchat:read` and `sabchat:write` gate per-route access."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_public_api"
path = "src/lib.rs"

[dependencies]
# Axum HTTP ŌĆö matches the feature union of sibling SabChat routers so the
# parent api crate compiles with a single resolved feature set.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (contact / conversation / tenant ids on the
# wire are hex strings; parsed via `ObjectId::parse_str` and
# `oid_from_str`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` stamps.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing ŌĆö anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates.
#
# - `sabchat-types`: shared DTOs persisted in Mongo.
# - `sabnode-common`: ApiError + uniform response envelope.
# - `sabnode-db`: MongoHandle + bson helpers.
# - `wachat-public-api`: provides the `ApiKeyVerifier` + `ApiKeyAuth`
#   extractor. NO `sabnode-auth` dep ŌĆö this is the API-key surface, not
#   the JWT surface.
sabchat-types = { path = "../sabchat-types" }
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
wachat-public-api = { path = "../wachat-public-api" }

[lints]
workspace = true
