# SabCRM — axum router for the **stage approvals** HTTP surface.
#
# CRUD-ish lifecycle over the `sabcrm_approvals` Mongo collection: stage-gate
# approval requests raised when a record tries to enter a pipeline stage
# declared with `requiresApproval: true` (see `sabcrm-pipelines`). A request
# is `pending` until a decider approves or rejects it. Tenancy is by
# `projectId` (a query/body string), not `userId`.
#
# Mirrors `rust/crates/sabcrm-pipelines`. Mounted under
# `/v1/sabcrm/approvals` from the orchestrating `api` crate.
[package]
name = "sabcrm-approvals"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabCRM stage-approvals HTTP surface (`/v1/sabcrm/approvals/*`). Per-project stage-gate approval requests scoped by `projectId`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcrm_approvals"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"

anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
