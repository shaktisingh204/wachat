# Standalone workspace on purpose: this cdylib is built ONLY by scripts/build-sabsheet-wasm.sh
# (wasm-pack), never by the server `cargo build --bin sabnode-api` nor by `cargo --workspace`.
# The empty [workspace] table detaches it from the parent 705-crate workspace.
[workspace]

[package]
name = "sabsheet-engine-wasm"
version = "0.1.0"
edition = "2021"
description = "wasm-bindgen façade over sabsheet-engine for the client calc worker."
license = "UNLICENSED"
publish = false

[lib]
crate-type = ["cdylib"]

# wasm-pack ships a stale wasm-opt that rejects bulk-memory ops emitted by the current toolchain.
# Disable it here; scripts/build-sabsheet-wasm.sh runs a modern system wasm-opt when available.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[dependencies]
sabsheet-engine = { path = "../sabsheet-engine" }
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
