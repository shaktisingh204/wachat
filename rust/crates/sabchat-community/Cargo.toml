# Axum router for the SabChat **community forum** HTTP surface.
#
# Owns tenant-scoped topics + replies (posts) with upvotes, accepted
# answers, and lightweight moderation (pin / status / delete). Feeds the
# self-service deflection story: answered topics become public Q&A that
# the resolve-bot and KB can draw on.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-community"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat community-forum HTTP surface (`/v1/sabchat/community/*`): tenant-scoped topics + replies over `sabchat_community_topics` / `sabchat_community_posts`, with upvotes, accepted answers, and pin/status/delete moderation."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_community"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"
anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
