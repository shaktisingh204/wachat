[package]
name = "sabflow-webhooks"
version = "0.1.0"
edition = "2024"
description = "SabFlow inbound webhook trigger handler — registers webhook slugs and enqueues executions on inbound HTTP calls."
license = "UNLICENSED"
publish = false

[lib]
name = "sabflow_webhooks"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }

futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

tracing = "0.1"
anyhow = "1"
uuid = { version = "1", features = ["v4", "serde"] }

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-queue = { path = "../wachat-queue" }

[lints]
workspace = true
