[package]
name = "sabnode-api"
version = "0.1.0"
edition = "2024"
description = "SabNode HTTP API binary (Phase 0)."
license = "UNLICENSED"
publish = false

[[bin]]
name = "sabnode-api"
path = "src/main.rs"

[dependencies]
common = { package = "sabnode-common", path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabnode-users = { path = "../users" }
sabnode-observability = { path = "../observability" }

axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors", "request-id", "util", "timeout"] }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

dotenvy = "0.15"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
anyhow = "1.0"
