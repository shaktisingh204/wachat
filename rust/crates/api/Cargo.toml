[package]
name = "sabnode-api"
version = "0.1.0"
edition = "2024"
description = "SabNode HTTP API binary (Phase 0)."
license = "UNLICENSED"
publish = false

[[bin]]
name = "sabnode-api"
path = "src/main.rs"

[dependencies]
common = { package = "sabnode-common", path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabnode-users = { path = "../users" }
sabnode-observability = { path = "../observability" }

wachat-webhook = { path = "../wachat-webhook" }
wachat-webhook-config = { path = "../wachat-webhook-config" }
wachat-webhook-verify = { path = "../wachat-webhook-verify" }
wachat-webhook-status = { path = "../wachat-webhook-status" }
wachat-webhook-inbound = { path = "../wachat-webhook-inbound" }
wachat-webhook-account = { path = "../wachat-webhook-account" }
wachat-webhook-template-events = { path = "../wachat-webhook-template-events" }
wachat-webhook-dlq = { path = "../wachat-webhook-dlq" }
wachat-webhook-contacts = { path = "../wachat-webhook-contacts" }
wachat-webhook-conversations = { path = "../wachat-webhook-conversations" }
wachat-queue = { path = "../wachat-queue" }

wachat-templates = { path = "../wachat-templates" }
wachat-templates-mutate = { path = "../wachat-templates-mutate" }
wachat-templates-sync = { path = "../wachat-templates-sync" }
wachat-templates-categories = { path = "../wachat-templates-categories" }
wachat-templates-send = { path = "../wachat-templates-send" }
wachat-templates-router = { path = "../wachat-templates-router" }
wachat-meta-client = { path = "../wachat-meta-client" }
wachat-media = { path = "../wachat-media" }

wachat-send = { path = "../wachat-send" }
wachat-send-cta = { path = "../wachat-send-cta" }
wachat-send-flows = { path = "../wachat-send-flows" }
wachat-send-orders = { path = "../wachat-send-orders" }
wachat-contacts-resolve = { path = "../wachat-contacts-resolve" }
wachat-chat-read = { path = "../wachat-chat-read" }
wachat-chat-mark = { path = "../wachat-chat-mark" }
wachat-payment-request = { path = "../wachat-payment-request" }
wachat-send-router = { path = "../wachat-send-router" }
wachat-config = { path = "../wachat-config" }

axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors", "request-id", "util", "timeout"] }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

dotenvy = "0.15"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
anyhow = "1.0"

[lints]
workspace = true
