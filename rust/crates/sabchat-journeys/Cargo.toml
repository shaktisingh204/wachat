# Axum router for the SabChat **outbound journeys** HTTP surface.
#
# A journey is an ordered list of steps (message / wait / branch / goal)
# that contacts are enrolled into; a scheduler-callable `/tick` advances
# every due run one step at a time. `message` steps enqueue onto
# `sabchat_journey_outbox` — the delivery dispatcher (channel adapter) is
# a separate seam so this crate stays a pure orchestration state machine.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-journeys"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat outbound-journeys HTTP surface (`/v1/sabchat/journeys/*`): journey + run CRUD over `sabchat_journeys` / `sabchat_journey_runs`, contact enrollment (by id or tag segment), and a cron-callable `/tick` that advances due runs and enqueues `message` steps onto `sabchat_journey_outbox`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_journeys"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"
anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
