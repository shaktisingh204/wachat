# Phase — axum router for the SabChat **co-browse** HTTP surface.
#
# Co-browse session signalling — an agent requests a shared browsing
# session against an existing conversation; the crate mints an opaque
# `visitor_token`, persists session state in `sabchat_cobrowse_sessions`,
# and exposes:
#
#   * agent-side endpoints under  `/v1/sabchat/cobrowse`         (AuthUser)
#   * public-side endpoints under `/v1/sabchat/cobrowse-public`  (token)
#
# The widget on the visitor's page calls the public endpoints to grant
# (or deny) consent, after which the agent can drive the shared session.
# This crate handles signalling + state only; the actual screen share
# transport is out of scope.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-cobrowse"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat co-browse HTTP surface — agent-side `/v1/sabchat/cobrowse/*` (request / end / list) plus the public visitor `/v1/sabchat/cobrowse-public/*` (consent / status) used by the JS widget."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_cobrowse"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (ids on the wire are hex strings; we parse
# via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `started_at` / `ended_at` / `created_at`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Token primitives — `rand` for the 32-hex visitor token, `hex` for the
# stable lowercase encoding the widget round-trips.
rand = "0.8"
hex = "0.4"

# Sibling crates — shared error envelope, JWT extractor (agent side),
# Mongo handle, and the SabChat domain types we re-use for the audit
# `System` content block.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
