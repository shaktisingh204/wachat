[package]
name = "sabflow-engine-runtime"
version = "0.1.0"
edition = "2024"
description = "Rust-side SabFlow execution engine — dispatches node executions via sabflow-nodes."
license = "UNLICENSED"
publish = false

[lib]
name = "sabflow_engine_runtime"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
futures = "0.3"
tracing = "0.1"
anyhow = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

sabflow-nodes = { path = "../sabflow-nodes" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
