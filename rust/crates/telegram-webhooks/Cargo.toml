[package]
name = "telegram-webhooks"
version = "0.1.0"
edition = "2024"
description = "Telegram webhook subscription config + delivery log + DLQ + replay. Observes deliveries to the per-bot Bot API webhook the telegram-bots crate already configures."
license = "UNLICENSED"
publish = false

[lib]
name = "telegram_webhooks"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }

futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

tracing = "0.1"
anyhow = "1"
thiserror = "2"

reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "gzip"] }
base64 = "0.22"
rand = "0.8"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
