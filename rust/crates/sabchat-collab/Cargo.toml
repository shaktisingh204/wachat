# Axum router for the SabChat **collaboration** HTTP surface.
#
# Two agent-collaboration primitives that hang off a conversation:
#   * side conversations — a private internal side-thread (discuss a ticket
#     with a teammate without the customer seeing it);
#   * conversation links — relate two conversations (same customer, dup, …).
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-collab"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat collaboration HTTP surface (`/v1/sabchat/collab/*`): private side conversations (`sabchat_side_conversations` / `sabchat_side_messages`) and conversation links (`sabchat_conversation_links`), all tenant-scoped."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_collab"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"
anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
