[package]
name = "wachat-flows"
version = "0.1.0"
edition = "2024"
description = "Wachat trigger-based flow CRUD. Mirrors src/app/actions/flow.actions.ts."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_flows"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }

futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

tracing = "0.1"
anyhow = "1"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true

# === Integration note ===========================================
# This crate is not yet listed in `rust/Cargo.toml` `workspace.members`
# (the integration owner wires that). To verify the crate locally before
# integration, temporarily add `crates/wachat-flows` to the workspace
# members array, run `cargo check -p wachat-flows`, then revert.
# ================================================================
