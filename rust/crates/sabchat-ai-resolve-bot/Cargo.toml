# Phase — axum router for the SabChat **auto-resolve RAG bot** HTTP surface.
#
# Given an incoming visitor question, retrieves over Help Center articles
# (`sabchat_kb_articles`) and past resolved conversations
# (`sabchat_messages`), composes a prompt, calls the configured LLM
# adapter, and either appends a bot reply (when confident) or returns a
# suggested-handoff payload (when below the per-inbox threshold).
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-ai-resolve-bot"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat auto-resolve RAG bot HTTP surface (`/v1/sabchat/ai/resolve-bot/*`). Retrieves over `sabchat_kb_articles` + prior resolved messages and either appends a bot reply or returns a suggested handoff."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_ai_resolve_bot"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (ids on the wire are hex strings; we parse
# via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# Trait-object-safe async methods on the `Bot` adapter trait.
async-trait = "0.1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# and the SabChat domain DTOs.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
