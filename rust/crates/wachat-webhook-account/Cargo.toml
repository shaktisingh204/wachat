# Empty [workspace] table makes this crate buildable standalone while it
# waits to be added to the parent workspace's `members` list (per the
# Phase 2 slice contract: do not modify the workspace Cargo.toml).
[workspace]

[package]
name = "wachat-webhook-account"
version = "0.1.0"
edition = "2024"
description = "Processor for account-level Meta WhatsApp webhook fields (account_alerts, account_update, account_review_update, business_capability_update, phone_number_quality_update, phone_number_name_update, security). Maintains projects + account_events audit log."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_webhook_account"
path = "src/lib.rs"

[dependencies]
# Async runtime — `process()` is async because Mongo updates are.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Serde stack — webhook `value` is open-ended JSON.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Mongo BSON. We use `doc!` for filters/updates and `ObjectId` for project ids.
bson = { version = "2.13", features = ["chrono-0_4"] }
mongodb = "3.2"

# Logging plumbing.
tracing = "0.1"

# Error / time stack.
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Sibling workspace crates — public APIs only.
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-meta-dto = { path = "../wachat-meta-dto" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
bson = { version = "2.13", features = ["chrono-0_4"] }
