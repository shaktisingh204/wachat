[package]
name = "telegram-business-inbox"
version = "0.1.0"
edition = "2024"
description = "Telegram Business Inbox — unified inbox across all bots in a project. Threads, agent assignment, tags, SLA, notes, analytics."
license = "UNLICENSED"
publish = false

[lib]
name = "telegram_business_inbox"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }
futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
anyhow = "1"
utoipa = { version = "5", features = ["axum_extras", "chrono"] }
regex = "1"
rand = "0.8"
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
