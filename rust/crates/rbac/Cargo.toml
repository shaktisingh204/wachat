[package]
name = "sabnode-rbac"
version = "0.1.0"
edition = "2024"
license = "UNLICENSED"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

sabnode-auth = { path = "../auth" }
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
