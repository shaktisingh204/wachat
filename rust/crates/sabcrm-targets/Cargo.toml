# SabCRM — axum router for the **targets** HTTP surface.
#
# Polymorphic junctions linking ONE source activity (a note / task /
# activity) to MANY records of ANY object — Twenty's `task-target` /
# `note-target` morph pattern. A target row is
# `(sourceObject, sourceId) → (targetObject, targetId)`. Tenancy is by
# `projectId` (a query/body string). Mirrors Twenty's
# `twenty-server/.../modules/task` & `.../note` target entities.
#
# Mounted under `/v1/sabcrm/targets` from the orchestrating `api` crate.
[package]
name = "sabcrm-targets"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabCRM targets HTTP surface (`/v1/sabcrm/targets/*`). Polymorphic note/task/activity → record junctions scoped by `projectId`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcrm_targets"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"

anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
