# SabCRM — axum router for the **automation workflows** HTTP surface.
#
# CRUD over the `sabcrm_workflows` Mongo collection: per-project automation
# rules that fire a sequence of steps in response to record lifecycle events
# (`record.created` / `record.updated` / `record.deleted`). Tenancy is by
# `projectId` (a query/body string), not `userId`.
#
# Mounted under `/v1/sabcrm/workflows` from the orchestrating `api` crate.
[package]
name = "sabcrm-workflows"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabCRM automation-workflows HTTP surface (`/v1/sabcrm/workflows/*`). Record-event-triggered step pipelines scoped by `projectId`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcrm_workflows"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"

anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
