[package]
name = "sabsign-envelopes"
version = "0.1.0"
edition = "2021"

[lib]
name = "sabsign_envelopes"
path = "src/lib.rs"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
