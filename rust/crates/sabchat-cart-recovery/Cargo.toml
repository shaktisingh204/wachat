# Phase — axum router for the SabChat **cart-recovery** HTTP surface.
#
# Detects abandoned visitor carts reported by the tenant's storefront and
# decides when to fire a proactive widget prompt. Owns:
#   * Public visitor-side cart-event ingestion (no AuthUser — widget /
#     storefront snippet calls these).
#   * Agent-side recovery-rule CRUD and cart/trigger read surfaces.
#   * The `/sweep` action that scans active carts and fires recovery
#     triggers per matching rule.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-cart-recovery"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabChat cart-recovery HTTP surface (`/v1/sabchat/cart-recovery/*`). Owns visitor cart-event ingestion, recovery-rule CRUD, and the sweep that fires proactive widget prompts on idle carts."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_cart_recovery"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (cart / inbox / rule ids on the wire are
# hex strings; parsed via `oid_from_str`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / `lastEventAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared domain DTOs, error envelope, JWT extractor,
# Mongo handle.
sabchat-types = { path = "../sabchat-types" }
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
