# Phase — axum router for the SabChat **audit log** HTTP surface.
#
# Scope is intentionally narrow:
#   * GET  /                — paginated list of audit events for the tenant.
#   * GET  /{id}            — fetch one event by id.
#
# Writes do NOT live here. Sibling crates (`sabchat-conversations`,
# `sabchat-messages`, `sabchat-contacts`, `sabchat-inboxes`, …) append
# events inline as part of their own transactions. The optional
# `pub async fn record(...)` helper exported from this crate is the
# canonical *future* API — once sibling crates take a `sabchat-audit`
# path dep they can call it instead of hand-rolling `insert_one`.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-audit"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat audit-log HTTP surface (`/v1/sabchat/audit/*`). Owns list + get-by-id endpoints; exports a `record(...)` helper so other SabChat crates can append events through a single canonical API."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_audit"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (event / tenant ids on the wire are hex
# strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` on appended events + RFC3339 query window
# parsing on the list endpoint.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal` and is the
# return type of the public `record(...)` helper so callers can `?` it.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# and the SabChat audit DTOs (`SabChatAuditEvent`, `AuditAction`).
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
