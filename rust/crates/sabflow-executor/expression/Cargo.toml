[package]
name = "sabflow-executor-expression"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "SabFlow executor — expression engine scaffold (Track B Phase 4). n8n-compatible expression evaluation lands in later phases."

[lib]
name = "sabflow_executor_expression"
path = "src/lib.rs"

[dependencies]

# Test-only deps — no runtime cost. `serde_json` is the same crate version
# already used across the workspace (e.g. wachat-queue, wachat-templates-tests).
# We need it to read the JSON fixtures under `tests/fixtures/` for the
# Phase C.2.4 parity suite. The fixtures double as the acceptance criteria
# for the eventual evaluator implementation that supersedes the scaffold.
[dev-dependencies]
serde_json = "1"

[lints]
workspace = true
