[package]
name = "sabflow-executor-queue"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "SabFlow executor — queue & dispatcher scaffold (Track B Phase 2). BullMQ-compatible queue logic lands in later phases."

[lib]
name = "sabflow_executor_queue"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "signal", "sync", "time"] }
tokio-util = { version = "0.7", features = ["rt"] }

[lints]
workspace = true
