[package]
name = "sabflow-executor-queue"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "SabFlow executor — queue, dispatcher, retry, DLQ, rate-limit, cancellation, metrics (Track B Phase 2)."

[lib]
name = "sabflow_executor_queue"
path = "src/lib.rs"

[dependencies]
# Async stack — workspace standard.
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "time", "sync", "signal"] }
tokio-util = { version = "0.7", features = ["rt"] }
# Redis clients — `redis` for the dispatcher Lua claim path, `fred` for the
# pub/sub-heavy DLQ, rate-limit, and cancel modules. Phase B.10 will pick one
# and consolidate once the bench picks a winner.
redis = { version = "0.27", default-features = false, features = ["tokio-comp", "script", "aio"] }
fred = { version = "10.1", default-features = true }
# Serde for IPC + retry spec + DLQ notices.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `async_trait` for dyn ExecutorHandler + LuaExecutor traits.
async-trait = "0.1"
thiserror = "2"
anyhow = "1"
tracing = "0.1"
# Full-jitter PRNG for retry backoff.
rand = "0.8"
# Timestamp formatting for DLQ deposits.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

[lints]
workspace = true
