[package]
name = "sabshow-slides"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabShow slides HTTP surface (`/v1/sabshow/slides/*`). Owns create / list / get / update / delete / duplicate / reorder over the `sabshow_slides` collection, scoped by parent deck."
license = "UNLICENSED"
publish = false

[lib]
name = "sabshow_slides"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3"
futures = "0.3"
tracing = "0.1"
anyhow = "1"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
