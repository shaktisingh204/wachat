# Phase — axum router for SabChat **business-hours + holiday calendars**.
#
# Owns CRUD for the `sabchat_business_hours_calendars` collection plus
# the "are we open right now?" evaluator that reads both inbox-level
# business-hours and named calendars, cross-checking against the
# tenant's HRM holiday list (`crm_holidays`).
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-business-hours"
version = "0.1.0"
edition = "2024"
description = "Axum router mounting `/v1/sabchat/business-hours/*` — business-hours / holiday-calendar CRUD plus the `is-open` evaluator that reads inbox config and HRM holidays."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_business_hours"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction + bson::Document filters.
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock + IANA timezone math for the evaluator.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
chrono-tz = "0.10"

# Mongo driver wrappers + futures combinators.
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
