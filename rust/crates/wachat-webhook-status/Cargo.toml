# Empty [workspace] table makes this crate buildable standalone while it
# waits to be added to the parent workspace's `members` list (per the
# Phase 2 slice contract: do not modify the workspace Cargo.toml).
[package]
name = "wachat-webhook-status"
version = "0.1.0"
edition = "2024"
description = "Process Meta WhatsApp webhook status updates (sent/delivered/read/failed) into MongoDB MessageLog rows + broadcast counters. Idempotent, batch-friendly. Hosts the Phase-9 broadcast-counter HTTP endpoint consumed by the legacy Node webhook receiver during the broadcast-worker cutover."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_webhook_status"
path = "src/lib.rs"

[dependencies]
# Async runtime — needed for `async fn process(...)` and Mongo driver futures.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON document construction (`doc! { ... }`) for Mongo filters/updates,
# matching the `bson` version pinned in `sabnode-db`.
bson = { version = "2.13", features = ["chrono-0_4"] }

# Mongo driver — used for `Collection::update_one` and the `UpdateResult` type.
mongodb = "3.2"

# Stream combinators for the bulk `broadcast_contacts` cursor walk in
# `broadcast.rs`. Same minor pin used across the workspace.
futures = "0.3"

# Axum HTTP — only used by the Phase-9 broadcast-counter endpoint
# (`POST /v1/wachat/webhook-status/broadcast-statuses`). Same feature
# union as sibling routers so the api crate resolves a single set of
# cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros"] }

# JWT extractor for the broadcast-counter handler — mirrors the auth
# contract every other domain router uses (no anonymous access).
sabnode-auth = { path = "../auth" }

# Tracing for fail-soft logging on unknown wamids / malformed status strings.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal` via its `From` impl.
anyhow = "1"

# Chrono for the `statusUpdatedAt` timestamp. The TS uses `new Date()` (UTC),
# we mirror with `Utc::now()`. `serde` feature so BSON serializes via chrono.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Sibling crates — domain types and the shared error envelope.
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-meta-dto = { path = "../wachat-meta-dto" }

[dev-dependencies]
# Tokio macros for `#[tokio::test(flavor = "multi_thread")]`.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
bson = { version = "2.13", features = ["chrono-0_4"] }

[lints]
workspace = true
