[package]
name = "sabsheet-engine"
version = "0.1.0"
edition = "2024"
description = "SabSheet v2 spreadsheet engine — IronCalc wrapper + canonical command/op model. No axum/mongo; compiles native and wasm32."
license = "UNLICENSED"
publish = false

[lib]
name = "sabsheet_engine"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Vendored fork (rust/vendor/, MIT/Apache) — lets us add clean-room spreadsheet
# functions beyond upstream v0.7.1. See rust/vendor/VENDORED.md.
ironcalc_base = { path = "../../vendor/ironcalc-base" }
# xlsx I/O is server-only (pulls zip/quick-xml). Gated so the wasm crate stays lean.
ironcalc = { path = "../../vendor/ironcalc", optional = true }

[features]
default = []
xlsx = ["dep:ironcalc"]

[lints]
workspace = true
