# Phase — axum router for the SabChat **Apple Business Chat channel adapter**.
#
# Translates inbound Apple Business Chat Bot API updates (already normalised by an
# upstream webhook shim — typically the Next.js `/api/telegram/webhook`
# route or a sibling Rust webhook crate) into SabChat conversations +
# messages on the unified conversation graph.
#
# HTTP surface (server-to-server — no JWT):
#   * `POST /ingest`    — ingest one inbound Apple Business Chat message
#                         (text / photo / voice), resolving the
#                         `telegram` inbox by bot username, find-or-
#                         create the per-tenant contact keyed on the
#                         Apple Business Chat chat/from id, find-or-create the
#                         latest open conversation, then append a
#                         `SabChatMessage` (sender=Visitor, Inbound).
#   * `POST /callback`  — record a callback-query button press as a
#                         `System`-typed `SabChatMessage` on the
#                         active conversation.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-channel-apple"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabChat Apple Business Chat channel adapter (`/v1/sabchat/channels/telegram/*`). Translates Apple Business Chat Bot API updates into SabChat contacts / conversations / messages keyed on bot username + Apple Business Chat chat id."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_channel_apple"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction + driver helpers.
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / message timestamps.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrapper. We only need `find_one` / `insert_one` /
# `update_one` here, so no `futures` / cursor-streaming dependency.
mongodb = "3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — domain DTOs (SabChat shapes), shared error envelope,
# Mongo handle. No `sabnode-auth` dep: this surface is server-to-server,
# called by a trusted inbound webhook shim inside the same deployment.
sabchat-types = { path = "../sabchat-types" }
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
