[package]
name = "sabfiles"
version = "0.1.0"
edition = "2024"
description = "SabFiles — file manager domain (folders, files, sharing) backed by Cloudflare R2 (S3-compatible)."
license = "UNLICENSED"
publish = false

[lib]
name = "sabfiles"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }

futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

tracing = "0.1"
anyhow = "1"
thiserror = "2"

# Cloudflare R2 is S3-compatible — use aws-sdk-s3 with a custom endpoint.
aws-sdk-s3 = { version = "1", default-features = false, features = ["rt-tokio", "rustls"] }
aws-config = { version = "1", default-features = false, features = ["rt-tokio", "rustls"] }
aws-credential-types = "1"
aws-smithy-runtime-api = "1"

# Random share-token generation.
rand = "0.8"
hex = "0.4"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
