# Phase — axum router for the SabChat **voice / video calling** HTTP surface.
#
# Owns the WebRTC signaling endpoints (start / answer / end / fail / list /
# get) and persisted call records under the `sabchat_calls` Mongo collection.
# The actual media plane is fronted by a third-party provider (LiveKit /
# Daily.co); the per-call access token is issued via an env-driven adapter
# that is stubbed today.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-voice"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat voice / video calling HTTP surface (`/v1/sabchat/voice/*`). Owns call signaling endpoints, persisted call records in `sabchat_calls`, and provider-token issuance (stub today)."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_voice"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (tenant / conversation / call ids on the wire
# are hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `startedAt` / `endedAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Cryptographically-strong room id generation (32 hex chars).
rand = "0.8"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle, and
# the SabChat domain types (`ContentBlock` for the system-message we post
# into the conversation when a call ends).
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
