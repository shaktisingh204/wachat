# Phase — axum router for the SabChat **WhatsApp Cloud channel adapter**.
#
# Translates Wachat (WhatsApp Cloud API) inbound webhook events into
# SabChat conversations + messages. This crate is the adapter glue
# between the existing `wachat-webhook-inbound` crate and the unified
# SabChat conversation graph.
#
# HTTP surface (server-to-server — no JWT):
#   * `POST /ingest`  — ingest one inbound message, resolving/creating
#                       inbox-scoped contact + conversation, appending
#                       a `SabChatMessage` (sender=Visitor, Inbound).
#   * `POST /status`  — apply a delivery receipt to a previously
#                       ingested message (sent / delivered / read /
#                       failed).
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-channel-whatsapp"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabChat WhatsApp Cloud channel adapter (`/v1/sabchat/channels/whatsapp/*`). Translates Wachat inbound webhook events into SabChat contacts / conversations / messages and applies delivery receipts."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_channel_whatsapp"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction + driver helpers.
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / message timestamps.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`
# when scanning latest open conversations).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — domain DTOs (SabChat shapes), shared error envelope,
# Mongo handle. No `sabnode-auth` dep: this surface is server-to-server,
# called by trusted inbound webhook crates inside the same deployment.
sabchat-types = { path = "../sabchat-types" }
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
