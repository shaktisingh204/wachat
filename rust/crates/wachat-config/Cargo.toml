[package]
name = "wachat-config"
version = "0.1.0"
edition = "2024"
description = "Wachat configuration: project setup, phone sync/register/2FA/QR, webhook subscription."
license = "UNLICENSED"
publish = false

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = "3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
anyhow = "1"
futures = "0.3"

# RSA-2048 keypair generation for WhatsApp Flows data-exchange encryption.
# `pem` enables PKCS#8 (private) / SPKI (public) PEM export; `rand` supplies
# the CSPRNG that `RsaPrivateKey::new` requires. rsa 0.9 + rand 0.8 are
# already in the workspace lockfile, so this pulls in no new dep trees.
rsa = { version = "0.9", features = ["pem"] }
rand = "0.8"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-meta-client = { path = "../wachat-meta-client" }

[lints]
workspace = true
