[package]
name = "wachat-templates-actions"
version = "0.1.0"
edition = "2024"
description = "Wachat WhatsApp template Server Actions facade — action-state shaped responses for the Next.js BFF."
license = "UNLICENSED"
publish = false

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = "3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
anyhow = "1"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-templates = { path = "../wachat-templates" }
wachat-templates-categories = { path = "../wachat-templates-categories" }
wachat-templates-mutate = { path = "../wachat-templates-mutate" }
wachat-templates-sync = { path = "../wachat-templates-sync" }

[lints]
workspace = true
