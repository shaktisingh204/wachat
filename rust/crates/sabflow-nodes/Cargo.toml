[package]
name = "sabflow-nodes"
version = "0.1.0"
edition = "2024"
description = "SabFlow node trait, registry, descriptors, and 306 n8n-parity node implementations."
license = "UNLICENSED"
publish = false

[lib]
name = "sabflow_nodes"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "multipart", "gzip"] }

futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
regex = "1"
once_cell = "1"

bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }

tracing = "0.1"
anyhow = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
base64 = "0.22"

sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }

# Author-facing attribute macro `#[node(...)]`. Re-exported from this crate's
# root so authors only need `use sabflow_nodes::node` (the macro).
sabflow-node-derive = { path = "../sabflow-node-derive" }

urlencoding = "2"
md-5 = "0.10"

# Postgres + MySQL drivers for the `postgres` / `mySql` nodes. Compiled with
# rustls-tls so the crate doesn't drag in OpenSSL system deps.
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "postgres",
    "mysql",
    "json",
    "chrono",
    "tls-rustls",
] }

# Redis client for the `redis` node — matches the version already used
# elsewhere in the workspace (sabnode-db, wachat-queue, etc.).
fred = { version = "10.1", default-features = true, features = ["enable-rustls"] }

# SMTP client for the `emailSend` node.
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "rustls-tls", "tokio1-rustls-tls", "builder", "tokio1"] }

# IMAP client + TLS + parser for the `emailReadImap` node.
async-imap = { version = "0.10", default-features = false, features = ["runtime-tokio"] }
async-native-tls = { version = "0.5", default-features = false, features = ["runtime-tokio"] }
mail-parser = "0.10"

# S3-compatible object storage for the `s3` node. Already used by the
# sabfiles crate, so it should be cached.
aws-sdk-s3 = { version = "1", default-features = false, features = ["rustls", "rt-tokio"] }
aws-config = { version = "1", default-features = false, features = ["rustls", "rt-tokio"] }
aws-credential-types = "1"

# HTML parser for the `html` node.
scraper = "0.20"

# XML <-> JSON conversion for the `xml` node.
quick-xml = { version = "0.36", features = ["serialize"] }

# Hashing / HMAC / JWT support for the `crypto` and `jwt` nodes.
sha1 = "0.10"
sha2 = "0.10"
hmac = "0.12"
jsonwebtoken = "9"

# RSS / Atom feed parser for the `rssFeedRead` node.
rss = "2"

# AES-256-GCM for the credential-mock envelope inside `test_support`.
# Mirrors the wire format of
# `src/lib/sabflow/executor/credentials/crypto.ts` (Node's
# `aes-256-gcm`) so test envelopes are byte-compatible with the runtime
# resolver. Pulled in unconditionally so integration tests under
# `tests/` (which see the lib as an external crate, no dev-deps) can
# reach the `test_support::credentials_mock` types. The production code
# path never references the module; LTO will drop the symbols on a
# release build.
#
# NOT promoted to the workspace root — kept local to `sabflow-nodes`.
aes-gcm = "0.10"

[dev-dependencies]
# Mock HTTP server for `tests/credentials_parity.rs`. Same version
# pinned by the wachat templates integration suite, so the Cargo
# lockfile collapses to a single copy.
wiremock = "0.6"

[lints]
workspace = true
