# Phase 6 — axum router for the wachat **broadcasts** HTTP surface.
#
# This crate is the HTTP front door for the broadcast surface that the
# legacy `src/app/actions/broadcast.actions.ts` file owned in TypeScript:
#
#   * Mongo reads (list, get-by-id, attempts, attempts-export, logs)
#   * Mongo writes (insert broadcasts + broadcast_contacts, stop / cancel)
#   * BullMQ enqueue onto `broadcast-control` (handed off to the existing
#     Node worker — the worker port is a later phase)
#
# Per the Phase 6 slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Touches `rust/Cargo.toml` only to add itself to `members`.
#   * Touches the orchestrating `api` crate only to wire the new state +
#     router slice.
[package]
name = "wachat-broadcast"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the wachat broadcasts HTTP surface (`/v1/wachat/broadcast/*`). Owns the broadcast list / read / start / stop / requeue endpoints; delegates BullMQ enqueue to `wachat-queue` and Mongo I/O to `sabnode-db`."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_broadcast"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query", "multipart"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (broadcast / project / template ids on the
# wire are hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2.13", features = ["chrono-0_4"] }

# Wall-clock for `created_at` / `startedAt` etc.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3.2"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# Sibling crates — shared error envelope, JWT extractor, Mongo handle, the
# `Project` document shape, and the BullMQ producer.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-queue = { path = "../wachat-queue" }
wachat-media = { path = "../wachat-media" }

[lints]
workspace = true
