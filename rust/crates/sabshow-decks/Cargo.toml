# Phase — axum router for the SabShow **decks** HTTP surface.
#
# Owns the lifecycle of a SabShow presentation deck: create, list, get,
# update, archive, share. Decks are the top-level container under which
# slides, elements, themes, comments, versions, and publications all hang.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabshow-decks"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabShow decks HTTP surface (`/v1/sabshow/decks/*`). Owns create / list / get / update / share / archive over the `sabshow_decks` collection. Tenant-scoped by `userId` with shared-deck visibility via `sharedWithUserIds`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabshow_decks"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3"
futures = "0.3"
tracing = "0.1"
anyhow = "1"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
