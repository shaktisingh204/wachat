# Phase 5 slice 6 — axum router for the wachat **project / phone / webhook
# config** HTTP surface.
#
# This crate is the HTTP front door for the configuration-flavoured slices
# from Phase 5 (slices 1–5):
#
#   * `wachat-project-config`     — read + manual setup of a Project
#   * `wachat-phone-sync`         — sync phone numbers from Meta + profile updates
#   * `wachat-webhook-subscribe`  — WABA webhook subscription status / mutations
#   * `wachat-phone-register`     — phone-number registration / verification / 2SP
#   * `wachat-qr-codes`           — message-QR-code CRUD per phone number
#
# It owns no business logic — every handler delegates to one of those
# engines and renders the result through `ApiError`'s `IntoResponse` impl.
#
# Per the Phase 5 slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify the workspace `Cargo.toml`.
#   * Does NOT touch other crates' source.
[package]
name = "wachat-config-router"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the wachat project / phone / webhook configuration HTTP surface (`/v1/wachat/config/*`). Wires the project-config / phone-sync / webhook-subscribe / phone-register / qr-codes engines from Phase 5 slices 1-5 behind a single `Router<S>` generic over the caller's app state."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_config_router"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — `Router`, `State`, `Path`, `Query`, `Json` extractors.
# Same feature set as sibling routers (`wachat-templates-router`,
# `wachat-webhook-config`) so the api crate compiles with a single
# resolved feature union.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (project / phone-number ids on the wire are
# hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2.13", features = ["chrono-0_4"] }

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# Sibling crates — shared error envelope, JWT extractor, Mongo handle, the
# `Project` document shape, and every engine the handlers delegate to.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-project-config = { path = "../wachat-project-config" }
wachat-phone-sync = { path = "../wachat-phone-sync" }
wachat-webhook-subscribe = { path = "../wachat-webhook-subscribe" }
wachat-phone-register = { path = "../wachat-phone-register" }
wachat-qr-codes = { path = "../wachat-qr-codes" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }

[lints]
workspace = true
