[package]
name = "meta-flows"
version = "0.1.0"
edition = "2024"
description = "Meta WhatsApp Flows CRUD: create / save draft / update metadata / publish / deprecate / delete / preview / sync. Mirrors src/app/actions/meta-flow.actions.ts."
license = "UNLICENSED"
publish = false

[lib]
name = "meta_flows"
path = "src/lib.rs"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = "3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
anyhow = "1"
futures = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls", "stream"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-meta-client = { path = "../wachat-meta-client" }

[lints]
workspace = true
