# Phase — axum router for the SabChat **reports / analytics** HTTP surface.
#
# Scope is intentionally narrow and **read-only**:
#   * GET  /live                — live queue snapshot
#   * GET  /volume              — conversation + message volume buckets
#   * GET  /response-times      — first-response latency percentiles
#   * GET  /by-agent            — per-agent breakdown
#   * GET  /by-inbox            — per-inbox breakdown
#   * GET  /by-channel          — channel roll-up of by-inbox
#   * GET  /csat                — CSAT score / distribution
#
# Every endpoint is a thin Mongo aggregation against tenant-scoped
# collections (`sabchat_conversations`, `sabchat_messages`,
# `sabchat_assignments`, `sabchat_audit_log`, `sabchat_inboxes`). No
# writes happen here.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-reports"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat reports / analytics HTTP surface (`/v1/sabchat/reports/*`). Live queue, volume, response-time percentiles, per-agent / per-inbox / per-channel breakdowns, CSAT — all driven by Mongo aggregation pipelines."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_reports"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (tenant / inbox / agent ids on the wire
# are hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for the default 7-day window + RFC3339 query window
# parsing.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# and the SabChat domain DTOs (collection names + conversation shapes).
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
