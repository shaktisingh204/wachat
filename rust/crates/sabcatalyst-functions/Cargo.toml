# SabCatalyst — Cloud-function metadata.
# Owns CRUD on `sabcatalyst_functions`. The code ZIP itself lives in
# SabFiles (referenced by `codeBlobFileId`); deploys are dispatched to
# the TS-side `IFunctionExecutor` and tracked here.
[package]
name = "sabcatalyst-functions"
version = "0.1.0"
edition = "2024"
description = "Axum router for SabCatalyst cloud functions — metadata + deploy state. Code ZIPs live in SabFiles."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcatalyst_functions"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3"
futures = "0.3"
tracing = "0.1"
anyhow = "1"
utoipa = { version = "5", features = ["axum_extras", "chrono"] }
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
