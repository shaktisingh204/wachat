# Shared **domain DTOs** for the SabNode Email Suite Rust port.
#
# Pure-types crate. Mirrors `src/lib/email/types.ts` and the persisted
# document shapes for the new email-suite collections (segments, journeys,
# threads, events, brand kits, forms, deliverability, api keys, webhooks).
#
# No I/O, no logic, no axum. Just `Serialize + Deserialize` structs that
# every consuming email-* crate can `use email_types::*` from.

[package]
name = "email-types"
version = "0.1.0"
edition = "2024"
description = "Shared serde-derived DTOs for the SabNode Email Suite Rust port. Mirrors src/lib/email/types.ts."
license = "UNLICENSED"
publish = false

[lib]
name = "email_types"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2.13", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

[lints]
workspace = true
