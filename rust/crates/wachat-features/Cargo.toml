[package]
name = "wachat-features"
version = "0.1.0"
edition = "2024"
description = "Phase 6 of the wachat → Rust port. Mounts the entire `wachat-features` HTTP surface — chat labels, scheduled messages, contact notes, auto-reply rules, broadcast segments, analytics, contact groups, opt-out / blacklist, saved replies, chatbot responses, business hours, ratings, link clicks, agent assignment, media library, greeting / away, notification prefs, message tags, delivery report, import history, conversation filters, API keys, scheduled broadcasts, agent statuses, search, statistics, contact timeline, conversation transfer, webhook logs, credit usage, bulk messaging, phone-number profiles — under `/v1/wachat/features`."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_features"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

tracing = "0.1"
anyhow = "1"

reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

futures = "0.3"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-meta-client = { path = "../wachat-meta-client" }

[lints]
workspace = true
