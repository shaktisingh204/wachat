[package]
name = "crm-reports-types"
version = "0.1.0"
edition = "2024"
description = "Unified report DTOs (§7 in crm_function_plan.md): report definition, schedule, recipient, and request/result envelopes."
license = "UNLICENSED"
publish = false

[lib]
name = "crm_reports_types"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
crm-core = { path = "../crm-core" }

[dev-dependencies]
serde_json = "1"

[lints]
workspace = true
