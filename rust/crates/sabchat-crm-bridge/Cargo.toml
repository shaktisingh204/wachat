# Phase — axum router that bridges SabChat contacts/conversations with the CRM.
#
# Two-way sync between `sabchat_contacts` and `crm_contacts`, plus
# conversation → deal / ticket / booking shortcuts that write back into
# `sabchat_conversations.customAttrs`.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-crm-bridge"
version = "0.1.0"
edition = "2024"
description = "Axum router mounted under /v1/sabchat/crm-bridge — links sabchat_contacts to crm_contacts and creates deals/tickets/bookings from conversations."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_crm_bridge"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId / Document construction for our Mongo writes.
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver + futures combinators.
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# and the SabChat domain DTOs (only used for the collection-name
# constants and field naming references; we still write `bson::doc!` so
# the router stays best-effort).
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
