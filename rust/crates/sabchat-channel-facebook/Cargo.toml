# Phase — axum router for the SabChat Facebook channel adapter.
#
# Translates Facebook Messenger DMs and Page-comment webhook events into
# SabChat domain writes (contact resolution → conversation upsert →
# visitor message append). Server-to-server only: NO `AuthUser` extractor.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-channel-facebook"
version = "0.1.0"
edition = "2024"
description = "Axum router that ingests Facebook Messenger DMs + Page comment webhook events into SabChat (`/v1/sabchat/channels/facebook/*`)."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_channel_facebook"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId + document construction. Channel events arrive over the
# wire as hex strings; we parse them via `oid_from_str` from `sabnode-db`.
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / `lastMessageAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver — direct collection access for inbox lookup + upserts.
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, Mongo handle, SabChat DTO shapes.
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
