[package]
name = "telegram-mini-apps"
version = "0.1.0"
edition = "2024"
description = "Telegram Mini Apps registry — per-project Web App records, send/menu-button actions, init-data validation, sessions & analytics."
license = "UNLICENSED"
publish = false

[lib]
name = "telegram_mini_apps"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }
futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
anyhow = "1"
utoipa = { version = "5", features = ["axum_extras", "chrono"] }
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
subtle = "2.6"
urlencoding = "2"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
telegram-bots = { path = "../telegram-bots" }

[lints]
workspace = true
