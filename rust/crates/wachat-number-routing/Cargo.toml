# Axum router for the wachat **two-line / number-routing** surface.
#
# Owns phone-number -> team + default-route bindings used by the
# /wachat/two-line page. Pure CRUD over `wa_number_team_bindings`,
# scoped to the authenticated user. Leaf crate: no `[workspace]` table;
# the api crate wires it in.
[package]
name = "wachat-number-routing"
version = "0.1.0"
edition = "2024"
description = "Axum router for the wachat two-line number-routing surface (/v1/wachat/number-routing/*). Phone-number -> team/route bindings, scoped per user."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_number_routing"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3"
futures = "0.3"
tracing = "0.1"
anyhow = "1"
utoipa = { version = "5", features = ["axum_extras", "chrono"] }
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
