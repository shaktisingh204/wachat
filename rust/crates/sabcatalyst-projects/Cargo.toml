# SabCatalyst — Project entity (Zoho-Catalyst-equivalent BaaS).
#
# A project is the top-level scope: every function, table, file-store
# key, auth user, API key and domain hangs off a `projectId`. Owned by
# the SabNode user that creates it (`userId`), no cross-tenant sharing
# for now. Slug is the URL-safe handle used in the runtime route
# (`/api/catalyst/<slug>/...`) and must be unique per owner.
[package]
name = "sabcatalyst-projects"
version = "0.1.0"
edition = "2024"
description = "Axum router for SabCatalyst projects — top-level BaaS tenancy unit. Owns CRUD on the `sabcatalyst_projects` Mongo collection under `/v1/sabcatalyst/projects/*`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcatalyst_projects"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3"
futures = "0.3"
tracing = "0.1"
anyhow = "1"
utoipa = { version = "5", features = ["axum_extras", "chrono"] }
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
