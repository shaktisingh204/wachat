# Phase ŌĆö axum router that exposes SabChat as a set of SabFlow node
# descriptors plus the executor-facing HTTP entry points each `action`
# descriptor binds to.
#
# This crate is the bridge between two otherwise independent modules:
#
#   * SabFlow's executor reads `descriptors()` at boot (or `GET /nodes`
#     at runtime) to register triggers + actions.
#   * When the executor runs an action node, it POSTs to one of the
#     `/v1/sabchat/sabflow/actions/*` routes ŌĆö which mirror the writes
#     `sabchat-conversations` / `sabchat-messages` / `sabchat-macros`
#     do, re-implemented inline so we do not couple to those crates.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
#   * Does NOT import sister SabChat router crates.
[package]
name = "sabchat-sabflow-nodes"
version = "0.1.0"
edition = "2024"
description = "Axum router that publishes SabChat triggers + actions as SabFlow node descriptors (`GET /v1/sabchat/sabflow/nodes`) and exposes the action HTTP entry points SabFlow's executor calls."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_sabflow_nodes"
path = "src/lib.rs"

[dependencies]
# Axum HTTP ŌĆö same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction for tenant-scoped queries.
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators.
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing ŌĆö anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates ŌĆö shared error envelope, JWT extractor, Mongo handle,
# and the SabChat domain enums (`ConversationStatus`, `ContentBlock`, ŌĆ”).
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
