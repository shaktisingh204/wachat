# Phase — axum router for the SabChat **AI quality-assurance** HTTP surface.
#
# Auto-graders score every conversation against a tenant-defined rubric
# (greeting / empathy / resolution / upsell). Two paths: AI auto-grade
# (Grader trait → stub by default) and a manual agent-submitted form.
# Persisted scores feed the per-agent leaderboard.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-ai-qa"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat AI quality-assurance HTTP surface (`/v1/sabchat/ai/qa/*`). Rubric admin, AI + manual conversation grading, score retrieval, and per-agent leaderboard."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_ai_qa"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (rubric / conversation / score ids on the
# wire are hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / `gradedAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Async trait for the `Grader` abstraction so future LLM-backed graders
# can drop in without touching handlers.
async-trait = "0.1"

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# SabChat domain types (Conversation / Message structs the grader walks).
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
