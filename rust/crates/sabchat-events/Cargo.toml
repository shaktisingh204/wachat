# Phase — axum router + in-process event bus for the SabChat **events**
# domain. This crate owns:
#
#   * The canonical event taxonomy (string constants in `lib.rs`).
#   * The [`EventBus`] — a `Clone`-cheap wrapper around a
#     `tokio::sync::broadcast::Sender<EventEnvelope>` with capacity 4096
#     plus a best-effort Mongo append into `sabchat_events`. Sibling
#     SabChat crates clone the bus from app state and call `.publish(...)`
#     to fan out domain events to subscribers (webhook workers, the
#     WebSocket hub, AI workers, SabFlow triggers).
#   * The agent-facing read surface for the persisted log
#     (`/v1/sabchat/events` + replay).
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-events"
version = "0.1.0"
edition = "2024"
description = "Axum router + in-process event bus for the SabChat events domain. Owns the event taxonomy, an `EventBus` broadcast channel (capacity 4096) backed by a `sabchat_events` Mongo log, and the agent-facing read + replay HTTP surface (`/v1/sabchat/events/*`)."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_events"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (event / tenant ids on the wire are hex
# strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` on appended envelopes + RFC3339 query window
# parsing on the list endpoint.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans + publish lifecycle logs.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal` and is the
# return type of `EventBus::publish` so callers can `?` it.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# and the SabChat DTOs (for future strong-typed envelopes).
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
