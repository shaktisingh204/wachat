# Phase — axum router for the SabChat **widget** HTTP surface.
#
# This is the **public** SabChat widget API: the small set of endpoints
# the JS widget loaded on third-party websites talks to. There is no
# `AuthUser` extractor here — the widget is authenticated by an inbox id
# plus an opaque per-visitor token, with an optional HMAC identity hash
# for embedding logged-in app users.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-widget"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the public SabChat widget HTTP surface (`/v1/sabchat/widget/*`). Owns config / session / messages / history / end endpoints used by the third-party JS widget."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_widget"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (ids on the wire are hex strings; we parse
# via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / session expiry.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Crypto + token primitives — HMAC-SHA256 for `identityHmac` verification,
# `rand` for visitor-session token generation, `hex` for stable encoding.
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
rand = "0.8"

# Sibling crates — shared error envelope, Mongo handle, and the SabChat
# domain DTOs. Note: NO `sabnode-auth` — this is the public widget API
# and does not require a JWT.
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
