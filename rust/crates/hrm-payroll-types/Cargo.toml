[package]
name = "hrm-payroll-types"
version = "0.1.0"
edition = "2024"
description = "DTOs for HRM Payroll (§9 in crm_function_plan.md): employees, departments, attendance, leave, holidays, payroll runs, salary structures, payslips, statutory compliance, performance, settings."
license = "UNLICENSED"
publish = false

[lib]
name = "hrm_payroll_types"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
crm-core = { path = "../crm-core" }
crm-sales-types = { path = "../crm-sales-types" }

[dev-dependencies]
serde_json = "1"

[lints]
workspace = true
