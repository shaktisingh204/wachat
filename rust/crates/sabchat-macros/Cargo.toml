# Phase — axum router for the SabChat **macros** HTTP surface.
#
# Macros 2.0 — multi-step, conditional, variable-templated canned actions
# stored per-tenant and executable against an existing conversation.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-macros"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabChat macros HTTP surface (`/v1/sabchat/macros/*`). Owns CRUD over the `sabchat_macros` collection plus a `POST /{id}/run` executor that walks the macro's steps against an existing conversation, substituting `{{var}}` placeholders from the request `vars` bag and the conversation's `customAttrs`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_macros"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (macro / tenant / conversation ids on the
# wire are hex strings; we parse via `oid_from_str`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — domain DTOs, shared error envelope, JWT extractor,
# Mongo handle.
sabchat-types = { path = "../sabchat-types" }
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
