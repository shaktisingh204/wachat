# Phase 4 slice 6 — chat UI read endpoints.
#
# Mirrors `getInitialChatData` (line ~548) and `getConversation` (line ~626)
# from `src/app/actions/whatsapp.actions.ts`.
#
# Per the slice contract this crate is a leaf — it does NOT modify the
# parent workspace `Cargo.toml`. The orchestrator will add this crate to
# `workspace.members` when wiring the slice in.
[package]
name = "wachat-chat-read"
version = "0.1.0"
edition = "2024"
description = "Chat UI read endpoints (initial bootstrap + paginated conversation history) for the SabNode wachat module. Mirrors `getInitialChatData` and `getConversation` in `src/app/actions/whatsapp.actions.ts`. Returns DTOs whose JSON shape is exactly what the React chat client consumes today (camelCase, ObjectId primary keys, raw nested `content` blobs)."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_chat_read"
path = "src/lib.rs"

[dependencies]
# Async runtime — Mongo I/O.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Serialization — DTOs are camelCase so they round-trip with the existing
# React client. `serde_json::Value` is used as a passthrough for the
# free-form `content` blob the chat-message renderer dives into.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON / Mongo. `chrono-0_4` so `DateTime<Utc>` round-trips through BSON.
bson = { version = "2.13", features = ["chrono-0_4"] }
mongodb = "3.2"

# `TryStreamExt` for `cursor.try_collect()`. The mongodb cursor implements
# `futures::Stream`; without `futures` we'd have to hand-roll a `while
# let Some(doc) = cursor.next().await` loop in three places.
futures = "0.3"

# Structured logging.
tracing = "0.1"

# Error plumbing + time.
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Sibling crates — public APIs only.
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
