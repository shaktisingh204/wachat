# Phase — axum router for the CRM **sales-orders** HTTP surface.
#
# Mirrors the work done by `src/app/actions/crm-sales-orders.actions.ts`:
#   * Mongo reads  — paginated list (q + clientId + status filters), get-by-id.
#   * Mongo writes — create / update / soft-delete on the `crm_sales_orders`
#                    collection.
#
# Mounted under `/v1/crm/sales-orders` from the orchestrating `api` crate.
# Per the slice contract this crate is a leaf — the orchestrator wires it
# into the workspace `Cargo.toml`.
[package]
name = "crm-sales-orders"
version = "0.1.0"
edition = "2024"
description = "Sales-order CRUD + lineage handlers (§1.4). Reads/writes crm-sales-types::SalesOrder against the `crm_sales_orders` Mongo collection; ports `src/app/actions/crm-sales-orders.actions.ts`."
license = "UNLICENSED"
publish = false

[lib]
name = "crm_sales_orders"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3.2"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
axum = { version = "0.8", default-features = false, features = ["json", "http1", "query"] }
tracing = "0.1"
anyhow = "1.0"

crm-core = { path = "../crm-core" }
crm-sales-types = { path = "../crm-sales-types" }
sabnode-auth = { path = "../auth" }
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
