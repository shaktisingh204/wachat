# SabCRM — axum router for the generic **records** HTTP surface.
#
# A single metadata-driven CRUD surface over the `sabcrm_records` Mongo
# collection. Every object (companies, people, opportunities, …) routes
# through the same handlers; the `{object}` path segment is the object slug
# and tenancy is by `projectId` (+ `object`), not `userId`.
#
# Mirrors the work done by `src/lib/sabcrm/*.server.ts` record actions.
# Mounted under `/v1/sabcrm/records` from the orchestrating `api` crate.
[package]
name = "sabcrm-records"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabCRM generic records HTTP surface (`/v1/sabcrm/records/{object}/*`). Metadata-driven list / get / create / update / delete / group scoped by `projectId` + `object`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcrm_records"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (ids on the wire are hex strings; we parse via
# `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_next`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# and the SabCRM object metadata source-of-truth.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabcrm-core = { path = "../sabcrm-core" }

[lints]
workspace = true
