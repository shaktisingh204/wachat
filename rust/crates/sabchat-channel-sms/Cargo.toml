# Phase — axum router for the SabChat **SMS channel adapter**.
#
# This is the public ingest surface for SMS providers (Twilio, MSG91, …).
# The shim deployed in front of these providers normalises whatever
# provider-specific webhook shape they ship into a tiny JSON envelope
# (`{ to, from, text, providerMessageId, provider, timestamp? }`) and
# POSTs it here. There is no `AuthUser` extractor — provider signature
# verification happens in the shim crate (`sabsms-webhooks-inbound`);
# this adapter trusts pre-verified ingest events.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-channel-sms"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat SMS channel adapter (`/v1/sabchat/channels/sms/*`). Resolves inbox by `from_number`, upserts contact by phone, opens/reuses conversation, persists inbound visitor messages, and updates delivery status."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_channel_sms"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (ids on the wire are hex strings; we parse
# via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / message timestamps.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers.
mongodb = "3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, Mongo handle, and the SabChat
# domain DTOs (`ContentBlock` for the message payload shape). Note: NO
# `sabnode-auth` — provider webhooks cannot present a SabNode JWT.
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
