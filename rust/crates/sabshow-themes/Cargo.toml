[package]
name = "sabshow-themes"
version = "0.1.0"
edition = "2024"
description = "Axum router for the SabShow themes HTTP surface (`/v1/sabshow/themes/*`). Owns palette / font / master-layout configurations stored in `sabshow_themes`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabshow_themes"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3"
futures = "0.3"
tracing = "0.1"
anyhow = "1"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
