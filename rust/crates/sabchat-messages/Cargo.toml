# Phase — axum router for the SabChat **messages** HTTP surface.
#
# Owns append / list / get / edit / soft-delete on `sabchat_messages`,
# with side-effects on `sabchat_conversations` (preview, unread, first
# response) and `sabchat_audit_log` (paper trail).
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-messages"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat messages HTTP surface (`/v1/sabchat/messages/*`). Owns append / list / get / edit / soft-delete with conversation + audit side-effects."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_messages"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (ids on the wire are hex strings; we parse
# via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `updatedAt` / `firstResponseAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Sibling crates — shared error envelope, JWT extractor, Mongo handle,
# and the SabChat domain DTOs.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
sabchat-types = { path = "../sabchat-types" }
# Realtime fan-out — publish `message.created` / `conversation.updated`
# events to the per-tenant websocket hub after a successful write.
sabchat-ws = { path = "../sabchat-ws" }

[lints]
workspace = true
