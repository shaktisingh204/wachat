[package]
name = "sabvault-breach-alerts"
version = "0.1.0"
edition = "2024"
description = "Per-secret breach-status cache for SabVault. `sabvault_breach_alerts` Mongo collection. Provider integration (HIBP / custom) is wired in later — this crate only stores results."
license = "UNLICENSED"
publish = false

[lib]
name = "sabvault_breach_alerts"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
mongodb = "3.2"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
axum = { version = "0.8", default-features = false, features = ["json", "http1", "query"] }
tracing = "0.1"
anyhow = "1.0"

crm-common = { path = "../crm-common" }
sabnode-auth = { path = "../auth" }
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
