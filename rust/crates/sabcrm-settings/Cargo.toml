# SabCRM — axum router for the **settings** HTTP surface.
#
# Free-form per-project CRM workspace settings over the `sabcrm_settings`
# Mongo collection: ONE document per project (`projectId` unique) holding an
# arbitrary key/value `data` map. Tenancy is by `projectId` (a query/body
# string); every endpoint is guarded by `AuthUser`.
#
# Mounted under `/v1/sabcrm/settings` from the orchestrating `api` crate.
[package]
name = "sabcrm-settings"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabCRM settings HTTP surface (`/v1/sabcrm/settings/*`). One free-form key/value settings doc per `projectId`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcrm_settings"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"

anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
