# Phase — axum router for the SabChat **conversational commerce** HTTP
# surface. Catalog cards + payment links rendered inside the agent inbox,
# backed by the existing `shop` / `crm_items` product catalog and a new
# `sabchat_payment_requests` collection.
#
# Per the slice contract this crate is a leaf:
#   * No `[workspace]` table.
#   * Does NOT modify `rust/Cargo.toml`; the orchestrator wires it in.
[package]
name = "sabchat-commerce"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabChat conversational-commerce HTTP surface (`/v1/sabchat/commerce/*`). Sends product cards / carousels and payment-link messages into a SabChat conversation, and accepts provider callbacks that flip payment-request status."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_commerce"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (product / conversation / contact ids on
# the wire are hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `expiresAt`.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# OpenAPI annotations to keep parity with sibling routers.
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

# Dummy payment-link id generation. Real providers (Razorpay / Stripe /
# UPI) will replace this with HMAC-signed URLs in a follow-up; today the
# crate is provider-agnostic and emits a stable opaque token.
rand = "0.8"

# Sibling crates — shared error envelope, JWT extractor, Mongo handle.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

# SabChat domain types — used here for ContentBlock construction so the
# message payload we persist matches what the agent inbox + widget
# already render.
sabchat-types = { path = "../sabchat-types" }

[lints]
workspace = true
