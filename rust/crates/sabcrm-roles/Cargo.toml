# SabCRM — axum router for the **roles & permissions** HTTP surface.
#
# CRUD over the `sabcrm_roles` Mongo collection: named permission sets
# (free-form permission keys + assigned member ids). Tenancy is by
# `projectId` (a query/body string), not `userId`.
#
# Mirrors the SabCRM roles server surface. Mounted under
# `/v1/sabcrm/roles` from the orchestrating `api` crate.
[package]
name = "sabcrm-roles"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabCRM roles & permissions HTTP surface (`/v1/sabcrm/roles/*`). Named permission sets + member assignments scoped by `projectId`."
license = "UNLICENSED"
publish = false

[lib]
name = "sabcrm_roles"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

mongodb = "3"
futures = "0.3"

tracing = "0.1"

anyhow = "1"

utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
