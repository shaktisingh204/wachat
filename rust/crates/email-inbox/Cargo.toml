# email-inbox — axum router for the SabNode Email Suite inbox surface.
#
# Mounts under `/v1/email/inbox` and owns the threads / messages /
# assignments HTTP surface that backs the Mailchimp-parity inbox UI
# (`src/app/dashboard/email/inbox`). Pure CRUD over the
# `email_threads` / `email_messages` / `email_assignments` collections.
#
# Outbound SMTP send is NOT wired here — that lands later via a sibling
# `email-sender` worker fed by BullMQ. For now `POST /threads/:id/messages`
# persists the outbound row and logs a warning.
[package]
name = "email-inbox"
version = "0.1.0"
edition = "2024"
description = "Axum router that mounts the SabNode email inbox HTTP surface (`/v1/email/inbox/*`). Owns threads, messages, assignments; pure CRUD over Mongo."
license = "UNLICENSED"
publish = false

[lib]
name = "email_inbox"
path = "src/lib.rs"

[dependencies]
# Axum HTTP — same feature union as sibling routers so the api crate
# resolves a single set of cargo features at build time.
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros", "query"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON ObjectId construction (thread / message / assignment ids on the
# wire are hex strings; we parse via `oid_from_str` from `sabnode-db`).
bson = { version = "2.13", features = ["chrono-0_4"] }

# Wall-clock for `createdAt` / `lastMessageAt` etc.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Mongo driver wrappers + futures combinators (for `cursor.try_collect`).
mongodb = "3.2"
futures = "0.3"

# Tracing for handler-level spans.
tracing = "0.1"

# Error plumbing — anyhow funnels into `ApiError::Internal`.
anyhow = "1"

# Sibling crates — shared error envelope, JWT extractor, Mongo handle.
sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
