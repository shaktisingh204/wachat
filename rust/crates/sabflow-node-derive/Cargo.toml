[package]
name = "sabflow-node-derive"
version = "0.1.0"
edition = "2024"
description = "Attribute-macro that generates SabFlow Node trait impls so node authors write ~15 lines instead of ~80."
license = "UNLICENSED"
publish = false

[lib]
name = "sabflow_node_derive"
path = "src/lib.rs"
proc-macro = true

# `syn`, `quote`, and `proc-macro2` are kept as DIRECT deps of this crate (not
# workspace deps) — they are only consumed here and would otherwise pollute the
# workspace dependency graph.
[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"

# Dev-only: integration tests under `tests/` declare a local `sabflow_nodes`
# module that mirrors the real crate's surface, so we can verify macro
# expansion without introducing a cycle with sabflow-nodes itself.
[dev-dependencies]
async-trait = "0.1"
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
