[package]
name = "qr-codes"
version = "0.1.0"
edition = "2024"
description = "User-scoped QR-code maker (generic, NOT Meta WhatsApp /message_qrdls — that's wachat-config). Stores qr_codes + short_urls in Mongo."
license = "UNLICENSED"
publish = false

[lib]
name = "qr_codes"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", features = ["multipart"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
mongodb = "3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
anyhow = "1"
futures = "0.3"

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }

[lints]
workspace = true
