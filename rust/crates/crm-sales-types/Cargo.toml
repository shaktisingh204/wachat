[package]
name = "crm-sales-types"
version = "0.1.0"
edition = "2024"
description = "Domain DTOs for the CRM Sales module (clients, quotations, proformas, sales orders, delivery challans, invoices, receipts, credit notes). Pure data types — every doc flattens crm-core fragments for cross-cutting fields. Mirrors the TS shapes in src/lib/definitions.ts."
license = "UNLICENSED"
publish = false

[lib]
name = "crm_sales_types"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
thiserror = "2"
crm-core = { path = "../crm-core" }
sabnode-common = { path = "../common" }

[dev-dependencies]
serde_json = "1"

[lints]
workspace = true
