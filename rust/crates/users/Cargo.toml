[package]
name = "sabnode-users"
version = "0.1.0"
edition = "2024"
description = "User-domain HTTP handlers (e.g. GET /v1/me) for the SabNode Rust BFF."
license = "UNLICENSED"
publish = false

[lib]
name = "sabnode_users"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "http1", "tokio", "macros"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

bson = { version = "2", features = ["chrono-0_4"] }
mongodb = { version = "3" }

chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

tracing = "0.1"
anyhow = "1"

# OpenAPI annotations on handlers (gen wired up later from the api crate).
utoipa = { version = "5", features = ["axum_extras", "chrono"] }

sabnode-common = { path = "../common" }
sabnode-auth = { path = "../auth" }
sabnode-db = { path = "../db" }
