# Phase 3 slice 5 — single template message send.
#
# Mirrors `handleSendTemplateMessage` from
# `src/app/actions/send-template.actions.ts` (line ~16). Builds the Meta
# `POST /{phone-number-id}/messages` payload and writes the resulting
# outgoing message log.
#
# Per the Phase 3 slice contract this crate is a leaf — it does NOT modify
# the workspace `Cargo.toml`; the orchestrator wires it in. We deliberately
# omit a `[workspace]` table so the parent workspace owns membership.
[package]
name = "wachat-templates-send"
version = "0.1.0"
edition = "2024"
description = "Single template message send for the SabNode wachat module. Resolves a stored template, runs variable substitution via `wachat-templates-engine`, posts to Meta's `/{phone-number-id}/messages` endpoint via `wachat-meta-client`, then writes the outgoing message log to Mongo. Mirrors `handleSendTemplateMessage` in `src/app/actions/send-template.actions.ts`."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_templates_send"
path = "src/lib.rs"

[dependencies]
# Async runtime.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Serde stack — Meta wire shapes go through serde_json::Value because
# template `components` are opaque (per `wachat-meta-dto::TemplateBody`).
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Mongo BSON. `chrono-0_4` for `createdAt` interop.
bson = { version = "2.13", features = ["chrono-0_4"] }
mongodb = "3.2"

# Structured logging.
tracing = "0.1"

# Error plumbing + time.
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# HTTP — pulled by the meta-client transitively, but we declare it so the
# crate's own dep graph is explicit (and matches the prompt).
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Sibling crates — public APIs only.
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-phone = { path = "../wachat-phone" }
wachat-meta-client = { path = "../wachat-meta-client" }
wachat-meta-dto = { path = "../wachat-meta-dto" }
wachat-templates-engine = { path = "../wachat-templates-engine" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
wiremock = "0.6"
serde_json = "1"
bson = { version = "2.13", features = ["chrono-0_4"] }
url = "2"

[lints]
workspace = true
