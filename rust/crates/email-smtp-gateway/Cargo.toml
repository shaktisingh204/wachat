[package]
name = "email-smtp-gateway"
version = "0.1.0"
edition = "2024"
license = "UNLICENSED"
publish = false

[dependencies]
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
anyhow = "1"
bytes = "1"
clap = { version = "4", features = ["derive", "env"] }

[lints]
workspace = true
