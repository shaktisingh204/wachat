# Phase 1 — Shared domain DTOs for the SabChat module.
#
# Mirrors what the consuming crates persist in MongoDB. Pure data types,
# no logic, no I/O, no async. Leaf crate per the slice contract:
# does NOT modify `rust/Cargo.toml` workspace members; the orchestrator
# wires it in.
[package]
name = "sabchat-types"
version = "0.1.0"
edition = "2024"
description = "Domain DTOs (Mongo-document-shaped) shared across the SabChat handlers and workers. Pure data types — no I/O, no async."
license = "UNLICENSED"
publish = false

[lib]
name = "sabchat_types"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
thiserror = "2"
utoipa = { version = "5", features = ["chrono"] }
sabnode-common = { path = "../common" }

[dev-dependencies]
serde_json = "1"
bson = { version = "2", features = ["chrono-0_4"] }

[lints]
workspace = true
