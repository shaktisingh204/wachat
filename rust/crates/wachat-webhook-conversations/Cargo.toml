# Empty [workspace] table makes this crate buildable standalone while it
# waits to be added to the parent workspace's `members` list (per the
# Phase 2 slice contract: do not modify the workspace Cargo.toml).
[workspace]

[package]
name = "wachat-webhook-conversations"
version = "0.1.0"
edition = "2024"
description = "Maintain the `conversations` materialized-view collection (last_message_at, unread_count, last_message_text) on inbound + status webhook events. Phase 2 slice 9 of the wachat → Rust port."
license = "UNLICENSED"
publish = false

[lib]
name = "wachat_webhook_conversations"
path = "src/lib.rs"

[dependencies]
# Async runtime — `ConversationTracker::on_inbound` / `on_status` are async
# because they hit MongoDB. `macros` + `rt-multi-thread` mirror the rest of
# the workspace and are required for the dev test harness.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# Standard serialization stack used across the workspace. `serde_json` is
# dragged in for the webhook DTO's open-ended `Value` fields and so we can
# extract `text.body` without re-deriving structs already in `wachat-meta-dto`.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# BSON document construction (`doc! { ... }`) for Mongo filters/updates,
# matching the `bson` version pinned in `sabnode-db`. The `chrono-0_4`
# feature is required so we can serialize `DateTime<Utc>` directly into
# BSON `Date` for `lastMessageAt` / `lastDeliveredAt` / `lastReadAt`.
bson = { version = "2.13", features = ["chrono-0_4"] }

# Mongo driver — `Collection::find_one`, `update_one`, `UpdateResult`.
mongodb = "3.2"

# Tracing for fail-soft logging when:
# - inbound contact lookup misses (caller forgot to run the contacts agent
#   before this one), or
# - status update can't resolve a wamid → conversation (Meta retried for a
#   message we never persisted).
tracing = "0.1"

# Error plumbing — `anyhow::Error` → `ApiError::Internal` via the existing
# `From` impl. We reach for `anyhow!` for ad-hoc internal errors so the
# materialized view stays additive: a single per-message failure inside the
# loop is logged + counted, never propagated.
anyhow = "1"

# Chrono for the `lastMessageAt` / `createdAt` / `updatedAt` BSON DateTimes.
# `serde` feature so `bson::DateTime::from_chrono` and serde-driven
# round-trips both compile against the same chrono version.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

# Sibling crates — domain types, the shared error envelope, and the Mongo
# handle. Path deps because the workspace lockfile lives one level up.
sabnode-common = { path = "../common" }
sabnode-db = { path = "../db" }
wachat-types = { path = "../wachat-types" }
wachat-meta-dto = { path = "../wachat-meta-dto" }

[dev-dependencies]
# Tokio macros for `#[tokio::test(flavor = "multi_thread")]`.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
bson = { version = "2.13", features = ["chrono-0_4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
