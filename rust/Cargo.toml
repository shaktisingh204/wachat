[workspace]
resolver = "3"
members = [
    "crates/api",
    "crates/auth",
    "crates/common",
    "crates/db",
    "crates/observability",
    "crates/users",
    "crates/wachat-media",
    "crates/wachat-meta-auth",
    "crates/wachat-meta-client",
    "crates/wachat-meta-dto",
    "crates/wachat-phone",
    "crates/wachat-queue",
    "crates/wachat-rate-limit",
    "crates/wachat-templates-engine",
    "crates/wachat-types",
    "crates/wachat-webhook-verify",
]

[workspace.package]
edition = "2024"
license = "UNLICENSED"
publish = false

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
