[workspace.package]
edition = "2024"
license = "UNLICENSED"
publish = false

[profile.release]
lto = "thin"
codegen-units = 16
strip = "symbols"

# CI runs `cargo clippy -- -D warnings`. These style lints are noisy across a
# 26-crate workspace authored by many parallel agents — allow them rather than
# fighting drift on each merge. Real correctness lints (unused, dead_code,
# etc.) still escalate to errors.
[workspace.lints.clippy]
collapsible_if = "allow"
doc_overindented_list_items = "allow"
type_complexity = "allow"
useless_conversion = "allow"
result_large_err = "allow"
manual_div_ceil = "allow"
needless_question_mark = "allow"
single_match = "allow"
redundant_closure = "allow"
needless_borrow = "allow"
needless_borrows_for_generic_args = "allow"
unnecessary_lazy_evaluations = "allow"
collapsible_match = "allow"
needless_lifetimes = "allow"
needless_return = "allow"
bool_assert_comparison = "allow"
