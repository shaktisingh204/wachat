# benches/sabflow-node-parity/docker-compose.yml
#
# Two services:
#   - n8n     — upstream reference engine, used to record "expected" outputs
#               and as the parity opponent for runner.mjs.
#   - harness — a tiny Node shim that exposes POST /test → runs ONE n8n node
#               with the runner's wire contract { nodeType, params, items }
#               and returns { items }.  It does not depend on the n8n REST
#               API (no workflow-save, no editor, no credentials store).
#
# v0: the harness uses n8n-core's NodeExecuteFunctions directly via the
# n8n npm packages already bundled in the n8nio/n8n image.  No code is baked
# into a custom image — we mount a script and invoke `node` inside the
# upstream image.
#
# This compose file is invoked manually by runner.mjs's caller; the runner
# itself does not exec docker.

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: sabflow-parity-n8n
    ports:
      - "5678:5678"
    environment:
      # Disable user-management so the harness shim can call into the
      # internal executor without sign-in.  This container is short-lived
      # and bound to localhost only.
      - N8N_USER_MANAGEMENT_DISABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - GENERIC_TIMEZONE=UTC
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30

  harness:
    image: n8nio/n8n:latest
    container_name: sabflow-parity-harness
    depends_on:
      n8n:
        condition: service_healthy
    ports:
      - "5679:5679"
    # Override entrypoint so we run our own shim instead of the n8n editor.
    # The shim is mounted in as a single file — no npm install needed, the
    # upstream image already ships n8n-core / n8n-workflow.
    entrypoint: ["node", "/harness/server.mjs"]
    environment:
      - HARNESS_PORT=5679
      - N8N_USER_MANAGEMENT_DISABLED=true
      - TZ=UTC
    volumes:
      - ./tools/n8n-harness-server.mjs:/harness/server.mjs:ro
